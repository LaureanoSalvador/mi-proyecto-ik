<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afiliación de Instrumento - IK Multimedia</title>
    <link rel="stylesheet" href="estilos  2.css">
    <script src="ik mult.js"></script>
</head>
<body class="afiliacion-page">
    <div id="div2">
        <h1>Registro de Instrumento</h1>
        <form id="form-afiliacion">
            <p><strong>Nombre</strong>
                <input type="text" id="nombre" placeholder="Tu nombre">
            </p>
            <p><strong>Apellido</strong>
                <input type="text" id="apellido" placeholder="Tu apellido">
            </p>
            <p><strong>Edad</strong>
                <input type="number" id="edad" placeholder="Tu edad">
            </p>
            <p><strong>Teléfono</strong>
                <input type="tel" id="telefono" placeholder="Ej: +57 300...">
            </p>
            <p><strong>Correo Electrónico</strong>
                <input type="email" id="email" placeholder="correo@ejemplo.com">
            </p>

            <hr>
            <h1><u>Selección de Base</u></h1>

            <p><strong>Marca</strong>
                <select id="marcas" onchange="actualizarModelos()">
                    <option value="">Seleccione una marca</option>
                    <option value="Fender">Fender</option>
                    <option value="Squier">Squier</option>
                    <option value="Les Paul">Gibson / Les Paul</option>
                    <option value="Epiphone">Epiphone</option>
                    <option value="Ibanez">Ibanez</option>
                    <option value="PRS">PRS</option>
                    <option value="Yamaha">Yamaha</option>
                </select>
            </p>

            <p><strong>Modelo / Tipo de Cuerpo</strong>
                <select id="modelos">
                    <option value="">Seleccione un modelo</option>
                </select>
            </p>

            <button type="button" onclick="afiliar()">Siguiente: Personalizar Especificaciones</button>
        </form>
    </div>

    <style>
        hr {
            border: 0;
            border-top: 1px solid #ffcc00;
            margin: 20px 0;
            opacity: 0.3;
        }
    </style>
</body>
</html>
